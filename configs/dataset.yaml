# Config for data/generate_dataset.py
dataset:
  output: data/relaxed_circles.pt
  train_samples: 131072
  val_samples: 16384
  test_samples: 16384
  num_objects: 8
  radius_min: 0.05
  radius_max: 0.15
  xy_limit: 1.0

relax:
  steps: 150
  lr: 0.05
  batch_size: 4096
  hard_ground_projection: true
  hard_collision_projection: false
  collision_projection_iters: 1

physics:
  gravity_weight: 0.2
  ground_weight: 0.2
  collision_weight: 0.2
  y_ground: 0.0

runtime:
  seed: 42
  device: cuda

render:
  enabled: false
  dir: data/renders
  split: train
  count: 6
  size: 1024
