# Config for data/generate_dataset.py
dataset:
  output: data/relaxed_circles.pt
  train_samples: 8192
  val_samples: 2048
  test_samples: 2048
  num_objects: 8
  radius_min: 0.05
  radius_max: 0.15
  xy_limit: 1.0

relax:
  steps: 100
  lr: 0.05
  batch_size: 512

physics:
  gravity_weight: 0.2
  ground_weight: 0.2
  collision_weight: 0.2
  y_ground: 0.0

runtime:
  seed: 42
  device: auto

render:
  enabled: false
  dir: data/renders
  split: train
  count: 6
  size: 1024
