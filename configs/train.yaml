# Config for train.py
data:
  dataset: data/box2d_circles.pt
  train_split: train
  val_split: val
  use_init_state: false

train:
  epochs: 80
  batch_size: 1024
  lr: 0.0005
  weight_decay: 0.0001
  grad_clip: 1.0
  num_workers: 8

model:
  hidden_dim: 256
  time_dim: 128
  num_layers: 6
  num_heads: 8
  dropout: 0.05
  ffn_mult: 4

loss:
  physics_weight: 0.3
  physics_weight_min: 0.05
  physics_weight_max: 2.0
  physics_weight_eps: 1.0e-8
  gravity_weight: 0.2
  ground_weight: 0.2
  collision_weight: 0.2
  y_ground: 0.0

runtime:
  seed: 42
  device: cuda
  outdir: runs
  run_name: "a6000_train"
