# Config for train.py
data:
  dataset: data/box2d_circles.pt
  train_split: train
  val_split: val

train:
  epochs: 300
  batch_size: 256
  lr: 0.0006
  weight_decay: 0.0001
  grad_clip: 1.0
  num_workers: 8

model:
  hidden_dim: 256
  time_dim: 128
  num_layers: 6
  num_heads: 8
  dropout: 0.05
  ffn_mult: 4
  use_radius_condition: true

loss:
  physics_weight: 0.5
  physics_weight_min: 0.05
  physics_weight_max: 2.0
  physics_weight_eps: 1.0e-8
  gravity_weight: 0.1
  ground_weight: 0.1
  collision_weight: 0.3
  collision_alpha: 0.1
  collision_epsilon: 1.0e-5
  collision_constant: 0.01
  y_ground: 0.0

runtime:
  seed: 42
  device: cuda
  outdir: runs
  run_name: "a6000_train"
